<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>San Valentín 💌</title>

<!-- =====================
     COSAS QUE PODÉS CAMBIAR
     =====================
     1️⃣ Nombre de tu novia
     2️⃣ Fecha
     3️⃣ Textos románticos
-->

<style>
  body {
    margin: 0;
    height: 100vh;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #f8cdda, #fbd3e9);
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
  }

  .container {
    width: 100%;
    max-width: 420px;
    text-align: center;
  }

  /* ===== SOBRE ===== */
  .envelope {
    width: 260px;
    height: 170px;
    margin: auto;
    background: #fff;
    border-radius: 12px;
    position: relative;
    cursor: pointer;
    box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    transition: transform 0.4s ease;
  }

  .envelope:hover {
    transform: scale(1.03);
  }

  .envelope::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #ff6b81;
    clip-path: polygon(0 0, 50% 50%, 100% 0, 100% 100%, 0 100%);
    border-radius: 12px;
  }

  .envelope span {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: white;
    font-weight: 600;
    letter-spacing: 1px;
  }

  /* ===== CARTA ===== */
  .card {
    background: white;
    border-radius: 20px;
    padding: 35px 30px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.2);
    animation: fadeIn 1s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(15px); }
    to { opacity: 1; transform: translateY(0); }
  }

  h1 {
    color: #ff6b81;
    font-weight: 600;
  }

  p {
    color: #555;
    font-size: 1.05em;
    line-height: 1.5;
  }

  .buttons {
    margin-top: 30px;
    position: relative;
    height: 90px;
  }

  button {
    padding: 12px 28px;
    font-size: 1em;
    border: none;
    border-radius: 25px;
    cursor: pointer;
    transition: all 0.3s ease;
    position: absolute;
  }

  #yesBtn {
    background: #ff6b81;
    color: white;
    left: 50%;
    transform: translateX(-50%);
  }

  #yesBtn:hover {
    background: #ff4f68;
  }

  #noBtn {
    background: #ddd;
    color: #555;
    top: 50px;
    left: 50%;
    transform: translateX(-50%);
  }

  .hidden {
    display: none;
  }

  /* corazones suaves */
  .heart {
    position: absolute;
    bottom: -20px;
    font-size: 18px;
    opacity: 0.5;
    animation: floatUp 8s linear infinite;
  }

  @keyframes floatUp {
    from { transform: translateY(0); opacity: 0.5; }
    to { transform: translateY(-120vh); opacity: 0; }
  }
</style>
</head>

<body>

<div class="container">

  <!-- ✉️ INTRODUCCIÓN -->
  <div id="intro">
    <div class="envelope" onclick="abrirCarta()">
      <span>Ábreme 💌</span>
    </div>
  </div>

  <!-- 💖 CARTA -->
  <div id="carta" class="hidden card">

    <!-- 📝 CAMBIÁ EL NOMBRE -->
    <h1>Para ti, mi amor 💖</h1>

    <!-- 📝 CAMBIÁ EL TEXTO -->
    <p>
      Hay personas que llegan a la vida y la vuelven más bonita  
      sin darse cuenta. Tú eres una de ellas.
    </p>

    <p>
      <!-- 📝 CAMBIÁ LA FECHA -->
      Este <strong>14 de febrero</strong>, quiero preguntarte algo especial…
    </p>

    <h2 style="color:#ff6b81;">¿Quieres ser mi San Valentín? 💕</h2>

    <div class="buttons">
      <button id="yesBtn" onclick="aceptar()">Sí 💖</button>
      <button id="noBtn" onmouseover="moverBoton()">No</button>
    </div>
  </div>

</div>

<script>
  function abrirCarta() {
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("carta").classList.remove("hidden");
  }

  function aceptar() {
    document.body.innerHTML = `
      <div style="
        height:100vh;
        display:flex;
        flex-direction:column;
        justify-content:center;
        align-items:center;
        background:linear-gradient(135deg,#f8cdda,#fbd3e9);
        font-family:'Segoe UI',sans-serif;
        text-align:center;
      ">
        <h1 style="color:#ff6b81;">Gracias por decir que sí 💖</h1>
        <p style="font-size:1.2em;color:#555;">Prometo hacerte muy feliz ✨</p>
      </div>
    `;
  }

  function moverBoton() {
    const btn = document.getElementById("noBtn");
    const x = Math.random() * 60 - 30;
    const y = Math.random() * 30 - 15;
    btn.style.transform = `translate(${x}px, ${y}px)`;
  }

  // Corazones sutiles
  function crearCorazon() {
    const h = document.createElement("div");
    h.className = "heart";
    h.innerHTML = "💖";
    h.style.left = Math.random() * 100 + "vw";
    document.body.appendChild(h);
    setTimeout(() => h.remove(), 8000);
  }

  setInterval(crearCorazon, 1200);
</script>

</body>
</html>
