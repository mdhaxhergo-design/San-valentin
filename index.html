<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>💖 San Valentín 💖</title>

  <!-- =====================
       COSAS QUE PODÉS CAMBIAR
       ===================== -->
  <!-- 1️⃣ Cambiá el nombre de tu novia -->
  <!-- 2️⃣ Cambiá la fecha -->
  <!-- 3️⃣ Cambiá los textos románticos -->

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Comic Sans MS', cursive, sans-serif;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card {
      background: white;
      border-radius: 25px;
      padding: 30px;
      width: 90%;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      animation: aparecer 1.5s ease;
      position: relative;
    }

    @keyframes aparecer {
      from {
        transform: scale(0.7);
        opacity: 0;
      }
      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    h1 {
      color: #ff4d6d;
      margin-bottom: 10px;
      animation: latido 1.5s infinite;
    }

    @keyframes latido {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }

    p {
      color: #444;
      font-size: 1.1em;
    }

    .buttons {
      margin-top: 25px;
      position: relative;
      height: 120px;
    }

    button {
      padding: 12px 25px;
      font-size: 1.1em;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      transition: transform 0.2s;
      position: absolute;
    }

    #yesBtn {
      background-color: #ff4d6d;
      color: white;
      left: 50%;
      transform: translateX(-50%);
    }

    #yesBtn:hover {
      transform: translateX(-50%) scale(1.1);
    }

    #noBtn {
      background-color: #ccc;
      color: #333;
      top: 60px;
      left: 50%;
      transform: translateX(-50%);
    }

    .heart {
      position: absolute;
      color: #ff4d6d;
      font-size: 20px;
      animation: flotar 6s linear infinite;
      opacity: 0.8;
    }

    @keyframes flotar {
      from {
        transform: translateY(100vh) scale(1);
        opacity: 1;
      }
      to {
        transform: translateY(-10vh) scale(1.5);
        opacity: 0;
      }
    }
  </style>
</head>
<body>

  <div class="card">
    <!-- 💕 CAMBIÁ EL NOMBRE ACÁ -->
    <h1>💘 Mi amor 💘</h1>

    <!-- 💕 CAMBIÁ EL TEXTO -->
    <p>
      Desde que llegaste a mi vida todo es más lindo,  
      más divertido y más especial 🥰
    </p>

    <p>
      <!-- 💕 CAMBIÁ LA FECHA -->
      Este <strong>14 de febrero</strong> quiero preguntarte algo muy importante...
    </p>

    <h2 style="color:#ff4d6d;">¿Querés ser mi San Valentín? 💖</h2>

    <div class="buttons">
      <button id="yesBtn" onclick="aceptar()">Sí 💕</button>
      <button id="noBtn" onmouseover="moverBoton()">No 💔</button>
    </div>
  </div>

  <script>
    function aceptar() {
      document.body.innerHTML = `
        <div style="
          display:flex;
          flex-direction:column;
          justify-content:center;
          align-items:center;
          height:100vh;
          background:linear-gradient(135deg, #ff9a9e, #fad0c4);
          font-family:'Comic Sans MS', cursive;
          text-align:center;
        ">
          <h1 style="color:#ff4d6d;">💖 SABÍA QUE IBAS A DECIR QUE SÍ 💖</h1>
          <p style="font-size:1.3em;">Te amo mucho 🥹💘</p>
        </div>
      `;
    }

    function moverBoton() {
      const btn = document.getElementById("noBtn");
      const x = Math.random() * 250 - 125;
      const y = Math.random() * 100 - 50;

      btn.style.transform = `translate(${x}px, ${y}px)`;
    }

    // Corazones flotando
    function crearCorazon() {
      const heart = document.createElement("div");
      heart.classList.add("heart");
      heart.innerHTML = "💖";
      heart.style.left = Math.random() * 100 + "vw";
      heart.style.fontSize = (Math.random() * 20 + 15) + "px";
      document.body.appendChild(heart);

      setTimeout(() => {
        heart.remove();
      }, 6000);
    }

    setInterval(crearCorazon, 500);
  </script>

</body>
</html>
